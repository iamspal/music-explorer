services:
  music-explorer-backend:
    build: ./backend
    container_name: music-explorer-backend
    ports:
      - "8082:80"
    volumes:
      - ./backend:/var/www/html
    networks:
      - app-network

  music-explorer-frontend:
    build: ./frontend
    container_name: music-explorer-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8082
    networks:
      - app-network

networks:
  app-network:
    driver: bridge